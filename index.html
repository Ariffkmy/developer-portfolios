<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Developer Portfolios — Showcase</title>
  <meta name="description" content="Browse a curated showcase of developer portfolio websites from talented engineers around the world.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #060608;
      --surface: #0d0d12;
      --card-bg: rgba(15,15,20,0.75);
      --card-border: rgba(255,255,255,0.07);
      --card-border-hover: rgba(140,140,150,0.4);
      --text: #f0f0f5;
      --text-muted: #71717a;
      --text-dim: #3f3f46;
      --accent: #52525b;
      --accent-light: #a1a1aa;
      --accent-glow: rgba(113,113,122,0.2);
      --pill-bg: rgba(113,113,122,0.1);
      --nav-bg: rgba(5,5,7,0.85);
      --grid-line: rgba(255,255,255,0.03);
      --shadow: rgba(0,0,0,0.5);
    }

    html.light {
      --bg: #f4f4f5;
      --surface: #ffffff;
      --card-bg: rgba(255,255,255,0.85);
      --card-border: rgba(0,0,0,0.08);
      --card-border-hover: rgba(100,100,110,0.35);
      --text: #18181b;
      --text-muted: #71717a;
      --text-dim: #a1a1aa;
      --accent: #52525b;
      --accent-light: #52525b;
      --accent-glow: rgba(113,113,122,0.15);
      --pill-bg: rgba(113,113,122,0.08);
      --nav-bg: rgba(244,244,245,0.88);
      --grid-line: rgba(0,0,0,0.055);
      --shadow: rgba(0,0,0,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: transparent;
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── FIXED GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background-color: var(--bg);
      background-image:
        linear-gradient(var(--grid-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-line) 1px, transparent 1px);
      background-size: 48px 48px;
      transition: background-color 0.3s;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(80,80,90,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(60,60,70,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 200;
      background: var(--nav-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--card-border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-logo {
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(135deg, #a1a1aa 0%, #71717a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-logo svg { flex-shrink: 0; }

    .search-wrap {
      flex: 1;
      max-width: 440px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-clear {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: none;
      padding: 2px;
      border-radius: 4px;
      line-height: 0;
    }

    .search-clear:hover { color: var(--text); }

    #search {
      width: 100%;
      padding: 10px 38px 10px 40px;
      background: var(--pill-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    #search:focus {
      border-color: rgba(140,140,150,0.4);
      background: rgba(113,113,122,0.05);
    }

    #search::placeholder { color: var(--text-muted); }

    .nav-stat {
      font-size: 13px;
      color: var(--text-muted);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .nav-stat-num {
      color: var(--accent-light);
      font-weight: 600;
    }

    /* ── HERO ── */
    .hero {
      text-align: center;
      padding: 88px 24px 56px;
      position: relative;
      overflow: hidden;
    }

    .hero-glow {
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 900px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(113,113,122,0.1) 0%, rgba(113,113,122,0.04) 40%, transparent 70%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(113,113,122,0.1);
      border: 1px solid rgba(140,140,150,0.2);
      border-radius: 100px;
      padding: 6px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-light);
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .hero h1 {
      font-size: clamp(36px, 5.5vw, 64px);
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.03em;
      margin-bottom: 20px;
      color: var(--text);
      -webkit-background-clip: unset;
      -webkit-text-fill-color: unset;
      background-clip: unset;
    }

    .hero p {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.65;
    }

    /* ── FILTERS ── */
    .filters-section {
      padding: 0 32px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1000px;
      margin: 0 auto;
    }

    .filter-pill {
      padding: 7px 15px;
      border-radius: 100px;
      border: 1px solid var(--card-border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .filter-pill:hover {
      border-color: rgba(140,140,150,0.35);
      color: var(--text);
      background: var(--pill-bg);
    }

    .filter-pill.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 16px rgba(113,113,122,0.25);
    }

    /* ── GRID HEADER ── */
    .grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px 20px;
      max-width: 1440px;
      margin: 0 auto;
    }

    .grid-header-left { font-size: 13px; color: var(--text-muted); }
    .grid-header-left strong { color: var(--text); font-weight: 600; }

    .sort-select {
      padding: 7px 12px;
      background: var(--pill-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
    }

    .sort-select:focus { border-color: rgba(140,140,150,0.35); }
    .sort-select option { background: var(--surface); color: var(--text); }

    /* ── GRID ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
      padding: 0 32px 40px;
      max-width: 1440px;
      margin: 0 auto;
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      display: block;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s, box-shadow 0.2s;
      position: relative;
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: var(--card-border-hover);
      box-shadow: 0 24px 48px var(--shadow), 0 0 0 1px rgba(140,140,150,0.12), 0 0 40px rgba(113,113,122,0.06);
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 16/10;
      position: relative;
      overflow: hidden;
    }

    .card-thumb-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--card-border);
      user-select: none;
    }

    .card-thumb-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .card-thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.4s;
    }

    .card-thumb img.loaded { opacity: 1; }

    .card-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      opacity: 0;
      transition: opacity 0.15s;
    }

    .card:hover .card-badge { opacity: 1; }

    .card-body {
      padding: 14px 16px 16px;
    }

    .card-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.01em;
    }

    .card-tagline {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.45;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 34px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-domain {
      font-size: 11px;
      color: var(--accent-light);
      opacity: 0.75;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }

    .card-visit {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-muted);
      flex-shrink: 0;
      background: var(--pill-bg);
      border: 1px solid var(--card-border);
      border-radius: 7px;
      padding: 5px 10px;
      transition: all 0.15s;
    }

    .card:hover .card-visit {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── EMPTY ── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 24px;
      color: var(--text-muted);
    }

    .empty-state svg { margin-bottom: 16px; opacity: 0.3; }
    .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* ── SKELETON ── */
    .skeleton-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      overflow: hidden;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .skeleton-thumb { width: 100%; aspect-ratio: 16/10; background: var(--card-border); }
    .skeleton-body { padding: 14px 16px 16px; }
    .skeleton-line { background: var(--card-border); border-radius: 6px; margin-bottom: 8px; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* ── LOAD MORE ── */
    .load-more-wrap {
      text-align: center;
      padding: 8px 24px 80px;
    }

    #load-more {
      padding: 13px 40px;
      background: transparent;
      border: 1px solid rgba(140,140,150,0.25);
      border-radius: 12px;
      color: var(--accent-light);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    #load-more:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 8px 24px rgba(113,113,122,0.25);
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--card-border);
      padding: 28px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    footer p { font-size: 13px; color: var(--text-muted); }
    footer a { color: var(--accent-light); text-decoration: none; }
    footer a:hover { color: var(--accent); }

    .footer-links { display: flex; gap: 20px; }
    .footer-links a { font-size: 13px; color: var(--text-muted); }
    .footer-links a:hover { color: var(--text); }

    /* ── SCROLL TO TOP ── */
    #scroll-top {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px rgba(140,140,150,0.35);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }

    #scroll-top.visible { opacity: 1; transform: translateY(0); }
    #scroll-top:hover { background: #71717a; }

    /* ── THEME TOGGLE ── */
    #theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: var(--pill-bg);
      border: 1px solid var(--card-border);
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }

    #theme-toggle:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* smooth color transitions globally */
    *, nav, footer, .card, .filter-pill, .sort-select, #search, #load-more {
      transition: background-color 0.25s, border-color 0.25s, color 0.25s, box-shadow 0.25s;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 768px) {
      nav { padding: 12px 16px; gap: 12px; }
      .search-wrap { max-width: none; flex: 1; }
      .nav-stat { display: none; }
      .hero { padding: 60px 16px 40px; }
      .filters-section { padding: 0 16px 24px; justify-content: flex-start; overflow-x: auto; flex-wrap: nowrap; }
      .filters-section::-webkit-scrollbar { display: none; }
      .grid { grid-template-columns: 1fr; padding: 0 16px 40px; gap: 14px; }
      .grid-header { padding: 0 16px 16px; }
      footer { padding: 20px 16px; flex-direction: column; align-items: flex-start; }
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 32px; }
      .hero p { font-size: 15px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
      <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="url(#logo-grad)" stroke="none"/>
      <defs>

<footer>

  </svg>

<script>
// ── THEME TOGGLE ──
(function () {
  const html = document.documentElement;
  const btn = document.getElementById('theme-toggle');
  const moon = btn.querySelector('.icon-moon');
  const sun = btn.querySelector('.icon-sun');

  function setTheme(light) {
    html.classList.toggle('light', light);
    moon.style.display = light ? 'none' : '';
    sun.style.display = light ? '' : 'none';
    localStorage.setItem('theme', light ? 'light' : 'dark');
  }

  const saved = localStorage.getItem('theme');
  const preferLight = saved ? saved === 'light' : window.matchMedia('(prefers-color-scheme: light)').matches;
  setTheme(preferLight);

  btn.addEventListener('click', () => setTheme(!html.classList.contains('light')));
})();

(function () {
  'use strict';

  const PAGE_SIZE = 24;
  function screenshotUrl(url) {
    return 'https://s0.wp.com/mshots/v1/' + encodeURIComponent(url) + '?w=600&h=375';
  }

  const FILTERS = [
    { label: 'All',         keys: null },
    { label: 'Full Stack',  keys: ['full stack'] },
    { label: 'Frontend',    keys: ['frontend', 'front-end', 'front end'] },
    { label: 'Backend',     keys: ['backend', 'back-end', 'back end'] },
    { label: 'AI / ML',     keys: ['ai', 'machine learning', 'ml engineer', 'data science', 'data scientist'] },
    { label: 'Mobile',      keys: ['mobile', 'ios', 'android', 'react native', 'flutter'] },
    { label: 'Designer',    keys: ['designer', 'ui/ux', 'ui ux', 'ux designer', 'product design'] },
    { label: 'DevOps',      keys: ['devops', 'cloud', 'aws', 'kubernetes', 'devsecops'] },
    { label: 'Blockchain',  keys: ['blockchain', 'web3', 'crypto', 'solidity'] },
  ];

  const BG_GRADIENTS = [
    ['#0d1117','#1c1f26'],
    ['#0f0c29','#1a1040'],
    ['#0d1b2a','#1b2838'],
    ['#13111c','#1e1740'],
    ['#0a1628','#0e2035'],
    ['#111827','#1f2937'],
    ['#0f172a','#1e293b'],
    ['#14000f','#280020'],
    ['#001114','#002030'],
    ['#0d1f12','#162b1e'],
  ];

  let all = [], filtered = [], displayed = 0;
  let activeFilter = null;
  let searchQuery = '';
  let sortMode = 'default';
  let baseOrder = [];

  function getGradient(name) {
    const i = (name.charCodeAt(0) + (name.charCodeAt(1) || 0)) % BG_GRADIENTS.length;
    const [a, b] = BG_GRADIENTS[i];
    return `linear-gradient(135deg, ${a} 0%, ${b} 100%)`;
  }

  function getInitials(name) {
    return name.trim().split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
  }

  function getDomain(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return url; }
  }

  function matchesFilter(p) {
    if (!activeFilter) return true;
    const t = (p.tagline || '').toLowerCase();
    return activeFilter.some(k => t.includes(k));
  }

  function matchesSearch(p) {
    if (!searchQuery) return true;
    const q = searchQuery.toLowerCase();
    return (
      p.name.toLowerCase().includes(q) ||
      (p.tagline || '').toLowerCase().includes(q) ||
      p.url.toLowerCase().includes(q)
    );
  }

  function applyFiltersAndSort() {
    let result = all.filter(p => matchesFilter(p) && matchesSearch(p));
    if (sortMode === 'random') {
      result = result.slice().sort(() => Math.random() - 0.5);
    }
    filtered = result;
    displayed = 0;
    document.getElementById('grid').innerHTML = '';
    renderBatch();
    updateLabels();
  }

  function renderBatch() {
    const grid = document.getElementById('grid');
    const batch = filtered.slice(displayed, displayed + PAGE_SIZE);

    if (batch.length === 0 && displayed === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <h3>No portfolios found</h3>
          <p>Try a different search term or clear the filters.</p>
        </div>`;
    } else {
      const frag = document.createDocumentFragment();
      batch.forEach(p => frag.appendChild(buildCard(p)));
      grid.appendChild(frag);
    }

    displayed += batch.length;
    const wrap = document.getElementById('load-more-wrap');
    wrap.style.display = displayed < filtered.length ? 'block' : 'none';
  }

  function buildCard(p) {
    const card = document.createElement('a');
    card.className = 'card';
    card.href = p.url;
    card.target = '_blank';
    card.rel = 'noopener noreferrer';

    const initials = getInitials(p.name);
    const bg = getGradient(p.name);
    const domain = getDomain(p.url);
    const tagline = p.tagline || 'Developer';

    card.innerHTML = `
      <div class="card-thumb" style="background:${bg}">
        <div class="card-thumb-grid"></div>
        <div class="card-thumb-placeholder">${initials}</div>
        <img data-src="${screenshotUrl(p.url)}" data-url="${escHtml(p.url)}" alt="${escHtml(p.name)} portfolio screenshot" loading="lazy">
        <div class="card-badge">${escHtml(domain)}</div>
      </div>
      <div class="card-body">
        <div class="card-name">${escHtml(p.name)}</div>
        <div class="card-tagline">${escHtml(tagline)}</div>
        <div class="card-footer">
          <span class="card-domain">${escHtml(domain)}</span>
          <span class="card-visit">
            Visit
            <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path d="M7 17L17 7M17 7H7M17 7v10"/>
            </svg>
          </span>
        </div>
      </div>`;

    const img = card.querySelector('img');
    observeImg(img);
    return card;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // mshots returns a tiny grey "please wait" image (naturalWidth === 160) on first hit.
  // Retry up to 4 times with increasing delay until a real screenshot arrives.
  function loadScreenshot(img, retries) {
    const url = img.dataset.url;
    const attempt = () => {
      const stamp = retries > 0 ? '&_=' + Date.now() : '';
      img.src = screenshotUrl(url) + stamp;
    };

    img.onload = () => {
      if (img.naturalWidth <= 160 && retries > 0) {
        // still the "loading" placeholder — retry
        setTimeout(() => loadScreenshot(img, retries - 1), 3000);
      } else if (img.naturalWidth > 160) {
        img.classList.add('loaded');
      } else {
        img.remove();
      }
    };
    img.onerror = () => img.remove();
    attempt();
  }

  const imgObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      loadScreenshot(img, 4);
      imgObserver.unobserve(img);
    });
  }, { rootMargin: '300px' });

  function observeImg(img) { imgObserver.observe(img); }

  function renderFilters() {
    const wrap = document.getElementById('filters');
    wrap.innerHTML = '';
    FILTERS.forEach(f => {
      const count = f.keys
        ? all.filter(p => f.keys.some(k => (p.tagline || '').toLowerCase().includes(k))).length
        : all.length;
      const active = JSON.stringify(f.keys) === JSON.stringify(activeFilter);
      const btn = document.createElement('button');
      btn.className = 'filter-pill' + (active ? ' active' : '');
      btn.textContent = f.label + (f.keys ? ` (${count.toLocaleString()})` : ` (${all.length.toLocaleString()})`);
      btn.addEventListener('click', () => {
        activeFilter = f.keys;
        renderFilters();
        applyFiltersAndSort();
      });
      wrap.appendChild(btn);
    });
  }

  function updateLabels() {
    const total = all.length;
    const shown = Math.min(displayed, filtered.length);
    const resultEl = document.getElementById('result-label');

    if (filtered.length === total && !searchQuery) {
      resultEl.innerHTML = `Showing <strong>${shown.toLocaleString()}</strong> of <strong>${total.toLocaleString()}</strong> portfolios`;
    } else {
      resultEl.innerHTML = `<strong>${filtered.length.toLocaleString()}</strong> results · showing ${shown.toLocaleString()}`;
    }

    document.getElementById('nav-num').textContent = total.toLocaleString();
  }

  function init(data) {
    all = data;
    baseOrder = data.slice();
    filtered = data.slice();
    renderFilters();
    renderBatch();
    updateLabels();
  }

  // Events
  let searchTimer;
  document.getElementById('search').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const val = e.target.value;
    searchQuery = val;
    document.getElementById('search-clear').style.display = val ? 'block' : 'none';
    searchTimer = setTimeout(() => {
      applyFiltersAndSort();
      renderFilters();
    }, 180);
  });

  document.getElementById('search-clear').addEventListener('click', () => {
    document.getElementById('search').value = '';
    searchQuery = '';
    document.getElementById('search-clear').style.display = 'none';
    applyFiltersAndSort();
    renderFilters();
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    sortMode = e.target.value;
    applyFiltersAndSort();
  });

  document.getElementById('load-more').addEventListener('click', () => {
    renderBatch();
    updateLabels();
  });

  const scrollTopBtn = document.getElementById('scroll-top');
  window.addEventListener('scroll', () => {
    scrollTopBtn.classList.toggle('visible', window.scrollY > 600);
  }, { passive: true });
  scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

  // Load data
  init(PORTFOLIO_DATA);

})();
</script>
